name: Discord Notify

on:
  push:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord Embed Notification
        run: |
          COMMIT="${{ github.event.head_commit.message }}"
          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          SHA="${{ github.sha }}"

          # commitメッセージ空対策
          if [ -z "$COMMIT" ]; then
            COMMIT="No commit message"
          fi

          # GitHubの正しいコミットURL
          URL="https://github.com/${REPO}/commit/${SHA}"

          # Embed JSON生成
          PAYLOAD=$(jq -n \
            --arg title "GitHub Push Notification" \
            --arg repo "$REPO" \
            --arg branch "$BRANCH" \
            --arg commit "$COMMIT" \
            --arg url "$URL" \
            '{
              embeds: [
                {
                  title: $title,
                  url: $url,
                  color: 5814783,
                  fields: [
                    {name: "📦 Repository", value: $repo, inline: false},
                    {name: "🌿 Branch", value: $branch, inline: true},
                    {name: "📝 Commit", value: $commit, inline: false}
                  ]
                }
              ]
            }')

          # Discord送信（1回だけ）
          curl -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}"

          # Discord送信
          curl -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}"
